name: MangaMarker
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: ja
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: NO
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  MangaMarker:
    type: application
    platform: iOS
    sources:
      - path: MangaMarker
        excludes:
          - "App/Info.plist"
      # Info.plist は XcodeGen に生成させず、INFOPLIST_FILE で参照のみ。
      # (info: ディレクティブを使うと xcodegen generate 実行時に上書きされ、
      #  RakutenAppId 等の手書きキーが消えるため、ここでは buildPhase: none で
      #  プロジェクトに追加するだけに留める)
      - path: MangaMarker/App/Info.plist
        buildPhase: none
    resources:
      - path: MangaMarker/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.MangaMarker
        INFOPLIST_FILE: MangaMarker/App/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - sdk: SQLite3.tbd

  MangaMarkerTests:
    type: bundle.unit-test
    platform: iOS
    sources: [MangaMarkerTests]
    dependencies:
      - target: MangaMarker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.MangaMarkerTests
